<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacto | Gym System</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
<div class="layout">
    <aside class="sidebar">
        <div class="brand">
            <img src="img/logo.png" alt="Logo">
            <h1>GYM SYSTEM</h1>
            <p>Contacto</p>
        </div>
        <nav class="menu">
            <a href="main.html">Volver al inicio</a>
        </nav>
    </aside>

    <main class="content">
        <section class="hero">
            <h2>Contacto</h2>
        </section>

        <div class="panel-grid">
            <section class="panel">
                <h3>Formulario de contacto</h3>
                <div class="field">
                    <label>Nombre</label>
                    <input type="text" value="Cliente de ejemplo">
                </div>
                <div class="field">
                    <label>Correo</label>
                    <input type="email" value="cliente@gym.com">
                </div>
                <div class="field">
                    <label>Mensaje</label>
                    <textarea>Deseo información sobre membresías y horarios.</textarea>
                </div>
                <button class="btn btn-primary" onclick="mostrarMensaje('Mensaje enviado de forma visual.')">Enviar</button>
            </section>

            <section class="panel">
                <h3>Informacion del gimnasio</h3>
                <p>Telefono: 987 654 321</p>
                <p>Correo: contacto@gympower.pe</p>
                <p>Horario: lunes a sabado de 6:00 a.m. a 10:00 p.m.</p>
                <p>Direccion: Av. Fitness 123 - Huancayo</p>

                <h3>Redes sociales</h3>
                <div class="social-grid">
                    <div class="social-card">
                        <img src="img/instagram.png" alt="Instagram">
                        <p>Instagram</p>
                    </div>
                    <div class="social-card">
                        <img src="img/facebook.png" alt="Facebook">
                        <p>Facebook</p>
                    </div>
                    <div class="social-card">
                        <img src="img/twitter.png" alt="Twitter">
                        <p>Twitter</p>
                    </div>
                    <div class="social-card">
                        <img src="img/whatsapp.png" alt="WhatsApp">
                        <p>WhatsApp</p>
                    </div>
                </div>
            </section>
        </div>
    </main>
</div>
<script src="js/app.js"></script>
</body>
</html>
