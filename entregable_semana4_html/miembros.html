<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Miembros | Gym System</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
<div class="layout">
    <aside class="sidebar">
        <div class="brand">
            <img src="img/logo.png" alt="Logo">
            <h1>GYM SYSTEM</h1>
            <p>Miembros</p>
        </div>
        <nav class="menu">
            <a href="main.html">Volver al inicio</a>
        </nav>
    </aside>

    <main class="content">
        <section class="hero">
            <h2>Registro de miembros</h2>
        </section>

        <div class="panel-grid">
            <section class="panel">
                <h3>Formulario de miembro</h3>
                <div class="field">
                    <label>Nombres</label>
                    <input type="text" value="Carlos Ramos">
                </div>
                <div class="field">
                    <label>DNI</label>
                    <input type="text" value="70234561">
                </div>
                <div class="field">
                    <label>Telefono</label>
                    <input type="text" value="987654321">
                </div>
                <div class="field">
                    <label>Membresía</label>
                    <select>
                        <option>Mensual</option>
                        <option>Trimestral</option>
                        <option>Personalizado</option>
                    </select>
                </div>
                <div class="actions">
                    <button class="btn btn-primary" onclick="mostrarMensaje('Registro visual guardado.')">Guardar</button>
                    <button class="btn btn-secondary" onclick="mostrarMensaje('Modo edicion visual.')">Editar</button>
                </div>
            </section>

            <section class="table-panel">
                <h3>Lista de miembros</h3>
                <table>
                    <thead>
                    <tr>
                        <th>ID</th>
                        <th>Nombre</th>
                        <th>Membresía</th>
                        <th>Estado</th>
                        <th>Acciones</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr>
                        <td>1</td>
                        <td>Carlos Ramos</td>
                        <td>Mensual</td>
                        <td><span class="badge">Activo</span></td>
                        <td>
                            <button class="btn btn-secondary" onclick="mostrarMensaje('Editar miembro.')">Editar</button>
                            <button class="btn btn-danger" onclick="confirmarAccion('Eliminar visualmente este miembro?')">Eliminar</button>
                        </td>
                    </tr>
                    <tr>
                        <td>2</td>
                        <td>Maria Quispe</td>
                        <td>Trimestral</td>
                        <td><span class="badge">Activo</span></td>
                        <td>
                            <button class="btn btn-secondary" onclick="mostrarMensaje('Editar miembro.')">Editar</button>
                            <button class="btn btn-danger" onclick="confirmarAccion('Eliminar visualmente este miembro?')">Eliminar</button>
                        </td>
                    </tr>
                    <tr>
                        <td>3</td>
                        <td>Jorge Huaman</td>
                        <td>Mensual</td>
                        <td><span class="badge pending">Pendiente</span></td>
                        <td>
                            <button class="btn btn-secondary" onclick="mostrarMensaje('Editar miembro.')">Editar</button>
                            <button class="btn btn-danger" onclick="confirmarAccion('Eliminar visualmente este miembro?')">Eliminar</button>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </section>
        </div>
    </main>
</div>
<script src="js/app.js"></script>
</body>
</html>
