<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Gym System</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body class="login-page">
<div class="login-card">
    <img src="img/logo.png" alt="Logo del gimnasio">
    <h2>GYM SYSTEM</h2>

    <div class="field">
        <label for="usuario-login">Usuario</label>
        <input id="usuario-login" type="text" placeholder="admin">
    </div>

    <div class="field">
        <label for="password-login">Contraseña</label>
        <input id="password-login" type="password" placeholder="1234">
    </div>

    <div class="actions">
        <a class="btn btn-primary" href="main.html">Ingresar</a>
    </div>
</div>
</body>
</html>
