<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Membresías | Gym System</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
<div class="layout">
    <aside class="sidebar">
        <div class="brand">
            <img src="img/logo.png" alt="Logo">
            <h1>GYM SYSTEM</h1>
            <p>Membresías</p>
        </div>
        <nav class="menu">
            <a href="main.html">Volver al inicio</a>
        </nav>
    </aside>

    <main class="content">
        <section class="hero">
            <h2>Tipos de membresía</h2>
        </section>

        <div class="panel-grid">
            <section class="panel">
                <h3>Formulario de membresía</h3>
                <div class="field">
                    <label>Nombre del plan</label>
                    <input type="text" value="Mensual">
                </div>
                <div class="field">
                    <label>Precio</label>
                    <input type="text" value="120.00">
                </div>
                <div class="field">
                    <label>Duración</label>
                    <input type="text" value="30 días">
                </div>
                <div class="actions">
                    <button class="btn btn-primary" onclick="mostrarMensaje('Membresía guardada visualmente.')">Guardar</button>
                </div>
            </section>

            <section class="table-panel">
                <h3>Lista de membresías</h3>
                <table>
                    <thead>
                    <tr>
                        <th>ID</th>
                        <th>Plan</th>
                        <th>Precio</th>
                        <th>Duración</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr><td>1</td><td>Mensual</td><td>S/ 120</td><td>30 días</td></tr>
                    <tr><td>2</td><td>Trimestral</td><td>S/ 300</td><td>90 días</td></tr>
                    <tr><td>3</td><td>Personalizado</td><td>S/ 180</td><td>30 días</td></tr>
                    </tbody>
                </table>
            </section>
        </div>
    </main>
</div>
<script src="js/app.js"></script>
</body>
</html>
