<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Personal | Sistema de Gimnasio</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
    <script th:src="@{/js/app.js}"></script>
</head>
<body>
<div class="page-shell">
    <aside class="sidebar">
        <div class="brand">
            <img th:src="@{/logo.png}" alt="Logo">
            <h1>GYM SYSTEM</h1>
            <p>CRUD de personal</p>
        </div>
        <a class="nav-link" th:href="@{/main}">Volver al inicio</a>
    </aside>
    <main class="main-content">
        <section class="hero">
            <h2>Personal del gimnasio</h2>
            <p>Representa a los usuarios internos que trabajan en recepción, entrenamiento y soporte.</p>
        </section>

        <div class="panel-grid">
            <section class="form-card">
                <h3 th:text="${formulario.id} != null ? 'Editar personal' : 'Nuevo personal'"></h3>
                <form th:action="@{/personal/guardar}" th:object="${formulario}" method="post">
                    <input type="hidden" th:field="*{id}">
                    <div class="field-group">
                        <label>Nombres</label>
                        <input th:field="*{nombres}" required>
                    </div>
                    <div class="field-group">
                        <label>Cargo</label>
                        <input th:field="*{cargo}" required>
                    </div>
                    <div class="field-group">
                        <label>Turno</label>
                        <select th:field="*{turno}">
                            <option value="Mañana">Mañana</option>
                            <option value="Tarde">Tarde</option>
                            <option value="Noche">Noche</option>
                        </select>
                    </div>
                    <div class="field-group">
                        <label>Estado</label>
                        <select th:field="*{estado}">
                            <option value="Activo">Activo</option>
                            <option value="Inactivo">Inactivo</option>
                        </select>
                    </div>
                    <div class="actions">
                        <button class="btn btn-primary" type="submit">Guardar</button>
                        <a class="btn btn-secondary" th:href="@{/personal}">Limpiar</a>
                    </div>
                </form>
            </section>

            <section class="table-card">
                <h3>Lista del personal</h3>
                <table>
                    <thead>
                    <tr>
                        <th>ID</th>
                        <th>Nombre</th>
                        <th>Cargo</th>
                        <th>Turno</th>
                        <th>Estado</th>
                        <th>Acciones</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="persona : ${personalLista}">
                        <td th:text="${persona.id}"></td>
                        <td th:text="${persona.nombres}"></td>
                        <td th:text="${persona.cargo}"></td>
                        <td th:text="${persona.turno}"></td>
                        <td><span class="badge" th:text="${persona.estado}"></span></td>
                        <td>
                            <a class="btn btn-secondary" th:href="@{'/personal/editar/' + ${persona.id}}">Editar</a>
                            <a class="btn btn-danger" th:href="@{'/personal/eliminar/' + ${persona.id}}"
                               onclick="return confirmarEliminacion()">Eliminar</a>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </section>
        </div>
    </main>
</div>
</body>
</html>
