<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Login | Sistema de Gimnasio</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body class="login-page">
<div class="login-card">
    <img th:src="@{/logo.png}" alt="Logo del gimnasio">
    <h2>Sistema de cobros y membresías</h2>
    <p>Ingreso simple para el personal del gimnasio.</p>

    <div class="alert" th:if="${error}" th:text="${error}"></div>

    <form th:action="@{/login}" method="post">
        <div class="field-group">
            <label for="usuario">Usuario</label>
            <input id="usuario" name="usuario" type="text" placeholder="admin" required>
        </div>

        <div class="field-group">
            <label for="password">Contraseña</label>
            <input id="password" name="password" type="password" placeholder="1234" required>
        </div>

        <button class="btn btn-primary" type="submit">Ingresar</button>
    </form>

    <p class="footer-note">Usuario de prueba: admin / 1234</p>
</div>
</body>
</html>
