<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Cobros | Sistema de Gimnasio</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
    <script th:src="@{/js/app.js}"></script>
</head>
<body>
<div class="page-shell">
    <aside class="sidebar">
        <div class="brand">
            <img th:src="@{/logo.png}" alt="Logo">
            <h1>GYM SYSTEM</h1>
            <p>CRUD de cobros</p>
        </div>
        <a class="nav-link" th:href="@{/main}">Volver al inicio</a>
    </aside>
    <main class="main-content">
        <section class="hero">
            <h2>Registro de cobros</h2>
            <p>Controla los pagos de las membresías de forma simple y fácil de exponer.</p>
        </section>

        <div class="panel-grid">
            <section class="form-card">
                <h3 th:text="${formulario.id} != null ? 'Editar cobro' : 'Nuevo cobro'"></h3>
                <form th:action="@{/cobros/guardar}" th:object="${formulario}" method="post">
                    <input type="hidden" th:field="*{id}">
                    <div class="field-group">
                        <label>Miembro</label>
                        <select th:field="*{miembro}">
                            <option th:each="miembro : ${miembrosDisponibles}" th:value="${miembro}" th:text="${miembro}"></option>
                        </select>
                    </div>
                    <div class="field-group">
                        <label>Monto</label>
                        <input th:field="*{monto}" type="number" step="0.01" required>
                    </div>
                    <div class="field-group">
                        <label>Fecha de cobro</label>
                        <input th:field="*{fechaCobro}" type="date" required>
                    </div>
                    <div class="field-group">
                        <label>Método de pago</label>
                        <select th:field="*{metodoPago}">
                            <option value="Efectivo">Efectivo</option>
                            <option value="Yape">Yape</option>
                            <option value="Tarjeta">Tarjeta</option>
                        </select>
                    </div>
                    <div class="field-group">
                        <label>Estado</label>
                        <select th:field="*{estado}">
                            <option value="Pagado">Pagado</option>
                            <option value="Pendiente">Pendiente</option>
                        </select>
                    </div>
                    <div class="actions">
                        <button class="btn btn-primary" type="submit">Guardar</button>
                        <a class="btn btn-secondary" th:href="@{/cobros}">Limpiar</a>
                    </div>
                </form>
            </section>

            <section class="table-card">
                <h3>Lista de cobros</h3>
                <table>
                    <thead>
                    <tr>
                        <th>ID</th>
                        <th>Miembro</th>
                        <th>Monto</th>
                        <th>Fecha</th>
                        <th>Método</th>
                        <th>Estado</th>
                        <th>Acciones</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="cobro : ${cobros}">
                        <td th:text="${cobro.id}"></td>
                        <td th:text="${cobro.miembro}"></td>
                        <td th:text="${'S/ ' + #numbers.formatDecimal(cobro.monto, 1, 2)}"></td>
                        <td th:text="${cobro.fechaCobro}"></td>
                        <td th:text="${cobro.metodoPago}"></td>
                        <td>
                            <span class="badge" th:classappend="${cobro.estado == 'Pendiente'} ? ' pending' : ''"
                                  th:text="${cobro.estado}"></span>
                        </td>
                        <td>
                            <a class="btn btn-secondary" th:href="@{'/cobros/editar/' + ${cobro.id}}">Editar</a>
                            <a class="btn btn-danger" th:href="@{'/cobros/eliminar/' + ${cobro.id}}"
                               onclick="return confirmarEliminacion()">Eliminar</a>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </section>
        </div>
    </main>
</div>
</body>
</html>
