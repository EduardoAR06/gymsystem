<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Asistencias | Sistema de Gimnasio</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
    <script th:src="@{/js/app.js}"></script>
</head>
<body>
<div class="page-shell">
    <aside class="sidebar">
        <div class="brand">
            <img th:src="@{/logo.png}" alt="Logo">
            <h1>GYM SYSTEM</h1>
            <p>Asistencia del personal</p>
        </div>
        <a class="nav-link" th:href="@{/main}">Volver al inicio</a>
    </aside>
    <main class="main-content">
        <section class="hero">
            <h2>Marcación de asistencia del personal</h2>
            <p>Esta página responde directamente al segundo proceso principal de tu tema asignado.</p>
        </section>

        <div class="panel-grid">
            <section class="form-card">
                <h3 th:text="${formulario.id} != null ? 'Editar asistencia' : 'Nueva asistencia'"></h3>
                <form th:action="@{/asistencias/guardar}" th:object="${formulario}" method="post">
                    <input type="hidden" th:field="*{id}">
                    <div class="field-group">
                        <label>Personal</label>
                        <select th:field="*{personal}">
                            <option th:each="persona : ${personalDisponible}" th:value="${persona}" th:text="${persona}"></option>
                        </select>
                    </div>
                    <div class="field-group">
                        <label>Fecha</label>
                        <input th:field="*{fecha}" type="date" required>
                    </div>
                    <div class="field-group">
                        <label>Hora de ingreso</label>
                        <input th:field="*{horaIngreso}" type="time" required>
                    </div>
                    <div class="field-group">
                        <label>Hora de salida</label>
                        <input th:field="*{horaSalida}" type="time" required>
                    </div>
                    <div class="field-group">
                        <label>Observación</label>
                        <textarea th:field="*{observacion}"></textarea>
                    </div>
                    <div class="actions">
                        <button class="btn btn-primary" type="submit">Guardar</button>
                        <a class="btn btn-secondary" th:href="@{/asistencias}">Limpiar</a>
                    </div>
                </form>
            </section>

            <section class="table-card">
                <h3>Lista de asistencias</h3>
                <table>
                    <thead>
                    <tr>
                        <th>ID</th>
                        <th>Personal</th>
                        <th>Fecha</th>
                        <th>Ingreso</th>
                        <th>Salida</th>
                        <th>Observación</th>
                        <th>Acciones</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="asistencia : ${asistencias}">
                        <td th:text="${asistencia.id}"></td>
                        <td th:text="${asistencia.personal}"></td>
                        <td th:text="${asistencia.fecha}"></td>
                        <td th:text="${asistencia.horaIngreso}"></td>
                        <td th:text="${asistencia.horaSalida}"></td>
                        <td th:text="${asistencia.observacion}"></td>
                        <td>
                            <a class="btn btn-secondary" th:href="@{'/asistencias/editar/' + ${asistencia.id}}">Editar</a>
                            <a class="btn btn-danger" th:href="@{'/asistencias/eliminar/' + ${asistencia.id}}"
                               onclick="return confirmarEliminacion()">Eliminar</a>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </section>
        </div>
    </main>
</div>
</body>
</html>
