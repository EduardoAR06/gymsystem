<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Clientes | GYM SYSTEM</title>
  <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>
<div class="layout">
  <div th:replace="~{fragments :: sidebar('miembros')}"></div>
  <main class="content">
    <section class="hero">
      <h2>Registro de Clientes</h2>
      <p>Gestion de clientes inscritos al gimnasio</p>
    </section>
    <div th:replace="~{fragments :: flash}"></div>

    <div class="panel-grid">
      <section class="panel">
        <h3 th:text="${editando} ? 'Editar cliente' : 'Nuevo cliente'">Formulario</h3>

        <form th:if="${editando}" th:action="@{/miembros/actualizar}" method="post">
          <input type="hidden" th:field="*{miembro.id}">
          <input type="hidden" th:field="*{miembro.fechaVencimiento}">
          <div class="field"><label>Nombres</label><input type="text" th:field="*{miembro.nombres}" required></div>
          <div class="field"><label>DNI</label><input type="text" th:field="*{miembro.dni}" required></div>
          <div class="field"><label>Telefono</label><input type="text" th:field="*{miembro.telefono}"></div>
          <div class="field">
            <label>Plan de membresia</label>
            <select th:field="*{miembro.membresia}">
              <option value="Mensual">Mensual (30 dias)</option>
              <option value="Trimestral">Trimestral (90 dias)</option>
              <option value="Anual">Anual (365 dias)</option>
            </select>
          </div>
          <div class="actions">
            <button type="submit" class="btn btn-primary">Actualizar</button>
            <a th:href="@{/miembros}" class="btn btn-secondary">Cancelar</a>
          </div>
        </form>

        <form th:unless="${editando}" th:action="@{/miembros/guardar}" method="post" th:object="${miembro}">
          <div class="field"><label>Nombres</label><input type="text" th:field="*{nombres}" placeholder="Ej: Juan Perez" required></div>
          <div class="field"><label>DNI</label><input type="text" th:field="*{dni}" placeholder="Ej: 70123456" required></div>
          <div class="field"><label>Telefono</label><input type="text" th:field="*{telefono}" placeholder="Ej: 987654321"></div>
          <div class="field">
            <label>Plan de membresia</label>
            <select th:field="*{membresia}">
              <option value="Mensual">Mensual (30 dias - S/. 80)</option>
              <option value="Trimestral">Trimestral (90 dias - S/. 210)</option>
              <option value="Anual">Anual (365 dias - S/. 700)</option>
            </select>
          </div>
          <div class="actions">
            <button type="submit" class="btn btn-primary">Guardar</button>
          </div>
        </form>
      </section>

      <section class="table-panel">
        <h3>Lista de clientes</h3>
        <table>
          <thead>
          <tr>
            <th>ID</th><th>Nombre</th><th>DNI</th><th>Plan</th>
            <th>Dias restantes</th><th>Vencimiento</th><th>Estado</th><th>Acciones</th>
          </tr>
          </thead>
          <tbody>
          <tr th:each="m : ${miembros}" th:classappend="${m.estado == 'Inactivo'} ? 'row-inactivo'">
            <td th:text="${m.id}"></td>
            <td th:text="${m.nombres}"></td>
            <td th:text="${m.dni}"></td>
            <td th:text="${m.membresia}"></td>
            <td>
              <span th:text="${m.diasRestantes}"></span> dias
              <span th:if="${m.diasRestantes <= 5 and m.diasRestantes > 0}" class="badge-warn">Por vencer</span>
            </td>
            <td th:text="${m.fechaVencimiento}"></td>
            <td>
              <span class="badge" th:classappend="${m.estado == 'Inactivo'} ? ' badge-inactivo'" th:text="${m.estado}"></span>
            </td>
            <td>
              <a th:href="@{/miembros/ficha/{id}(id=${m.id})}" class="btn btn-primary" style="font-size:0.78rem;">Ficha</a>
              <a th:href="@{/miembros/editar/{id}(id=${m.id})}" class="btn btn-secondary">Editar</a>
              <a th:href="@{/miembros/eliminar/{id}(id=${m.id})}" class="btn btn-danger"
                 onclick="return confirm('Eliminar este cliente?')">Eliminar</a>
            </td>
          </tr>
          </tbody>
        </table>
      </section>
    </div>
  </main>
</div>
</body>
</html>
