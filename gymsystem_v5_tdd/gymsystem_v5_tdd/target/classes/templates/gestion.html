<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Panel General | GYM SYSTEM</title>
  <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>
<div class="layout">
  <div th:replace="~{fragments :: sidebar('gestion')}"></div>
  <main class="content">
    <section class="hero">
      <h2>Panel General</h2>
      <p>Resumen operativo del sistema — acceso restringido a Administradores</p>
    </section>
    <div class="stats-grid">
      <div class="stat-card">
        <h4>Total Clientes</h4>
        <p class="stat-num" th:text="${totalMiembros}">0</p>
      </div>
      <div class="stat-card stat-green">
        <h4>Clientes Activos</h4>
        <p class="stat-num" th:text="${miembrosActivos}">0</p>
      </div>
      <div class="stat-card">
        <h4>Total Recaudado (S/)</h4>
        <p class="stat-num" th:text="${#numbers.formatDecimal(totalCobros, 1, 2)}">0.00</p>
      </div>
      <div class="stat-card">
        <h4>Personal registrado</h4>
        <p class="stat-num" th:text="${totalPersonal}">0</p>
      </div>
      <div class="stat-card">
        <h4>Asistencias registradas</h4>
        <p class="stat-num" th:text="${totalAsistencias}">0</p>
      </div>
    </div>
  </main>
</div>
</body>
</html>
