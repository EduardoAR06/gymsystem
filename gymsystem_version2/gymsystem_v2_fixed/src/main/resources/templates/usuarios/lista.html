<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head> <meta charset="UTF-8"> <meta name="viewport" content="width=device-width, initial-scale=1.0"> <title>Usuarios | GYM SYSTEM</title> <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>
<div class="layout"> <div th:replace="~{fragments :: sidebar('usuarios')}"></div> <main class="content"> <section class="hero"> <h2> Gestión de Usuarios</h2> <p>Solo el Administrador puede gestionar los accesos al sistema</p> </section> <div th:replace="~{fragments :: flash}"></div> <div class="panel-grid"> <section class="panel"> <h3 th:text="${editando} ? 'Editar usuario' : 'Nuevo usuario'">Formulario</h3> <form th:if="${editando}" th:action="@{/usuarios/actualizar}" method="post"> <input type="hidden" th:field="*{usuario.id}"> <div class="field"> <label>Nombre completo</label> <input type="text" th:field="*{usuario.nombres}" required> </div> <div class="field"> <label>Username</label> <input type="text" th:field="*{usuario.username}" required> </div> <div class="field"> <label>Contraseña</label> <input type="password" th:field="*{usuario.password}" required> </div> <div class="field"> <label>Rol</label> <select th:field="*{usuario.rol}"> <option value="ADMIN">Administrador — acceso total</option> <option value="MIEMBROS">Miembros — publicidad, contacto, miembros, membresías y cobros</option> <option value="ASISTENCIAS">Asistencias — publicidad, contacto, personal y asistencias</option> </select> </div> <div class="actions"> <button type="submit" class="btn btn-primary">Actualizar</button> <a th:href="@{/usuarios}" class="btn btn-secondary">Cancelar</a> </div> </form> <form th:unless="${editando}" th:action="@{/usuarios/guardar}" method="post" th:object="${usuario}"> <div class="field"> <label>Nombre completo</label> <input type="text" th:field="*{nombres}" placeholder="Ej: Juan Pérez" required> </div> <div class="field"> <label>Username</label> <input type="text" th:field="*{username}" placeholder="Ej: juan.perez" required> </div> <div class="field"> <label>Contraseña</label> <input type="password" th:field="*{password}" placeholder="Contraseña" required> </div> <div class="field"> <label>Rol</label> <select th:field="*{rol}"> <option value="ADMIN">Administrador — acceso total</option> <option value="MIEMBROS">Miembros — publicidad, contacto, miembros, membresías y cobros</option> <option value="ASISTENCIAS">Asistencias — publicidad, contacto, personal y asistencias</option> </select> </div> <div class="actions"> <button type="submit" class="btn btn-primary">Guardar</button> </div> </form> </section> <section class="table-panel"> <h3>Lista de usuarios del sistema</h3> <table> <thead> <tr> <th>ID</th> <th>Nombre</th> <th>Username</th> <th>Rol</th> <th>Acciones</th> </tr> </thead> <tbody> <tr th:each="u : ${usuarios}"> <td th:text="${u.id}"></td> <td th:text="${u.nombres}"></td> <td th:text="${u.username}"></td> <td> <span class="badge"
 th:classappend="${u.rol == 'ADMIN'} ? ' badge-admin' : (${u.rol == 'MIEMBROS'} ? ' badge-recep' : ' badge-entren')"
 th:text="${u.rol}"></span> </td> <td> <a th:href="@{/usuarios/editar/{id}(id=${u.id})}" class="btn btn-secondary">Editar</a> <a th:href="@{/usuarios/eliminar/{id}(id=${u.id})}" class="btn btn-danger"
 onclick="return confirm('¿Eliminar usuario?')">Eliminar</a> </td> </tr> </tbody> </table> </section> </div> </main>
</div>
</body>
</html>
