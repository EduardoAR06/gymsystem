<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head> <meta charset="UTF-8"> <meta name="viewport" content="width=device-width, initial-scale=1.0"> <title>Miembros | GYM SYSTEM</title> <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>
<div class="layout"> <div th:replace="~{fragments :: sidebar('miembros')}"></div> <main class="content"> <section class="hero"> <h2>Registro de Miembros</h2> <p>Gestión de clientes inscritos al gimnasio</p> </section> <div th:replace="~{fragments :: flash}"></div> <div class="panel-grid"> <!-- Formulario --> <section class="panel"> <h3 th:text="${editando} ? 'Editar miembro' : 'Nuevo miembro'">Formulario</h3> <!-- Editar --> <form th:if="${editando}" th:action="@{/miembros/actualizar}" method="post"> <input type="hidden" th:field="*{miembro.id}"> <input type="hidden" th:field="*{miembro.fechaVencimiento}"> <div class="field"> <label>Nombres</label> <input type="text" th:field="*{miembro.nombres}" required> </div> <div class="field"> <label>DNI</label> <input type="text" th:field="*{miembro.dni}" required> </div> <div class="field"> <label>Teléfono</label> <input type="text" th:field="*{miembro.telefono}"> </div> <div class="field"> <label>Plan de membresía</label> <select th:field="*{miembro.membresia}"> <option value="Mensual">Mensual (30 días)</option> <option value="Trimestral">Trimestral (90 días)</option> <option value="Anual">Anual (365 días)</option> </select> </div> <div class="actions"> <button type="submit" class="btn btn-primary">Actualizar</button> <a th:href="@{/miembros}" class="btn btn-secondary">Cancelar</a> </div> </form> <!-- Nuevo --> <form th:unless="${editando}" th:action="@{/miembros/guardar}" method="post" th:object="${miembro}"> <div class="field"> <label>Nombres</label> <input type="text" th:field="*{nombres}" placeholder="Ej: Juan Pérez" required> </div> <div class="field"> <label>DNI</label> <input type="text" th:field="*{dni}" placeholder="Ej: 70123456" required> </div> <div class="field"> <label>Teléfono</label> <input type="text" th:field="*{telefono}" placeholder="Ej: 987654321"> </div> <div class="field"> <label>Plan de membresía</label> <select th:field="*{membresia}"> <option value="Mensual">Mensual (30 días – S/. 80)</option> <option value="Trimestral">Trimestral (90 días – S/. 210)</option> <option value="Anual">Anual (365 días – S/. 700)</option> </select> </div> <div class="actions"> <button type="submit" class="btn btn-primary">Guardar</button> </div> </form> </section> <!-- Tabla --> <section class="table-panel"> <h3>Lista de miembros</h3> <table> <thead> <tr> <th>ID</th> <th>Nombre</th> <th>DNI</th> <th>Plan</th> <th>Días restantes</th> <th>Vencimiento</th> <th>Estado</th> <th>Acciones</th> </tr> </thead> <tbody> <tr th:each="m : ${miembros}" th:classappend="${m.estado == 'Inactivo'} ? 'row-inactivo'"> <td th:text="${m.id}"></td> <td th:text="${m.nombres}"></td> <td th:text="${m.dni}"></td> <td th:text="${m.membresia}"></td> <td> <span th:text="${m.diasRestantes}"></span> días
 <span th:if="${m.diasRestantes <= 5 and m.diasRestantes > 0}" class="badge-warn"> Por vencer</span> </td> <td th:text="${m.fechaVencimiento}"></td> <td> <span class="badge"
 th:classappend="${m.estado == 'Inactivo'} ? ' badge-inactivo'"
 th:text="${m.estado}"></span> </td> <td> <a th:href="@{/miembros/editar/{id}(id=${m.id})}" class="btn btn-secondary">Editar</a> <a th:href="@{/miembros/eliminar/{id}(id=${m.id})}" class="btn btn-danger"
 onclick="return confirm('¿Eliminar este miembro?')">Eliminar</a> </td> </tr> </tbody> </table> </section> </div> </main>
</div>
</body>
</html>
