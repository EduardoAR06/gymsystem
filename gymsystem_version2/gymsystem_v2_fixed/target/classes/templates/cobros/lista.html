<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cobros | GYM SYSTEM</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>
<div class="layout">
    <div th:replace="~{fragments :: sidebar('cobros')}"></div>

    <main class="content">
        <section class="hero">
            <h2>Registro de Cobros</h2>
        </section>

        <div th:replace="~{fragments :: flash}"></div>

        <div class="panel-grid">
            <section class="panel">
                <h3 th:text="${editando} ? 'Editar cobro' : 'Nuevo cobro'">Formulario</h3>

                <!-- Editar -->
                <form th:if="${editando}" th:action="@{/cobros/actualizar}" method="post">
                    <input type="hidden" th:field="*{cobro.id}">
                    <div class="field">
                        <label>Miembro</label>
                        <select th:field="*{cobro.miembroId}">
                            <option th:each="m : ${miembros}" th:value="${m.id}" th:text="${m.nombres}"></option>
                        </select>
                    </div>
                    <div class="field">
                        <label>Plan pagado</label>
                        <select th:field="*{cobro.planPagado}">
                            <option value="Mensual">Mensual (30 días)</option>
                            <option value="Trimestral">Trimestral (90 días)</option>
                            <option value="Anual">Anual (365 días)</option>
                        </select>
                    </div>
                    <div class="field">
                        <label>Monto (S/)</label>
                        <input type="number" step="0.01" th:field="*{cobro.monto}" required>
                    </div>
                    <div class="field">
                        <label>Método de pago</label>
                        <select th:field="*{cobro.metodoPago}">
                            <option value="Efectivo">Efectivo</option>
                            <option value="Yape">Yape</option>
                            <option value="Tarjeta">Tarjeta</option>
                        </select>
                    </div>
                    <div class="actions">
                        <button type="submit" class="btn btn-primary">Actualizar</button>
                        <a th:href="@{/cobros}" class="btn btn-secondary">Cancelar</a>
                    </div>
                </form>

                <!-- Nuevo con búsqueda de miembro -->
                <form th:unless="${editando}" th:action="@{/cobros/guardar}" method="post" th:object="${cobro}">

                    <!-- Buscador de miembro -->
                    <div class="field">
                        <label>Buscar miembro (nombre o DNI)</label>
                        <input type="text" id="buscarMiembro" placeholder="Escriba nombre o DNI..."
                               autocomplete="off" oninput="buscarMiembros(this.value)">
                        <div id="resultadosBusqueda" class="autocomplete-results" style="display:none"></div>
                        <input type="hidden" id="miembroIdInput" name="miembroIdForm">
                        <input type="hidden" id="miembroNombreInput" name="miembroNombreForm">
                        <p id="miembroSeleccionado" class="hint" style="color:#27ae60"></p>
                    </div>

                    <div class="field">
                        <label>Plan a pagar</label>
                        <select th:field="*{planPagado}" id="planSelect" onchange="actualizarMonto()">
                            <option value="Mensual">Mensual (30 días)</option>
                            <option value="Trimestral">Trimestral (90 días)</option>
                            <option value="Anual">Anual (365 días)</option>
                        </select>
                    </div>

                    <div class="field">
                        <label>Monto sugerido (S/)</label>
                        <input type="number" step="0.01" th:field="*{monto}" id="montoInput" placeholder="0.00" required>
                    </div>

                    <div class="field">
                        <label>Método de pago</label>
                        <select th:field="*{metodoPago}">
                            <option value="Efectivo">Efectivo</option>
                            <option value="Yape">Yape</option>
                            <option value="Tarjeta">Tarjeta</option>
                        </select>
                    </div>

                    <div class="actions">
                        <button type="submit" class="btn btn-primary">Registrar Cobro</button>
                    </div>
                </form>
            </section>

            <section class="table-panel">
                <h3>Historial de cobros</h3>
                <table>
                    <thead>
                    <tr>
                        <th>ID</th>
                        <th>Miembro</th>
                        <th>Plan</th>
                        <th>Monto</th>
                        <th>Método</th>
                        <th>Fecha</th>
                        <th>Estado</th>
                        <th>Acciones</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="c : ${cobros}">
                        <td th:text="${c.id}"></td>
                        <td th:text="${c.miembroNombre}"></td>
                        <td th:text="${c.planPagado}"></td>
                        <td>S/ <span th:text="${#numbers.formatDecimal(c.monto, 1, 2)}"></span></td>
                        <td th:text="${c.metodoPago}"></td>
                        <td th:text="${c.fecha}"></td>
                        <td>
                            <span class="badge" th:text="${c.estado}"></span>
                        </td>
                        <td>
                            <a th:href="@{/cobros/editar/{id}(id=${c.id})}" class="btn btn-secondary">Editar</a>
                            <a th:href="@{/cobros/eliminar/{id}(id=${c.id})}" class="btn btn-danger"
                               onclick="return confirm('¿Eliminar este cobro?')">Eliminar</a>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </section>
        </div>
    </main>
</div>

<script>
const precios = { Mensual: 80, Trimestral: 210, Anual: 700 };

function actualizarMonto() {
    const plan = document.getElementById('planSelect').value;
    document.getElementById('montoInput').value = precios[plan] || '';
}

function buscarMiembros(q) {
    if (q.length < 2) { document.getElementById('resultadosBusqueda').style.display='none'; return; }
    fetch('/cobros/buscar?q=' + encodeURIComponent(q))
        .then(r => r.json())
        .then(data => {
            const div = document.getElementById('resultadosBusqueda');
            div.innerHTML = '';
            if (data.length === 0) { div.innerHTML='<div class="autocomplete-item">Sin resultados</div>'; }
            data.forEach(m => {
                const item = document.createElement('div');
                item.className = 'autocomplete-item';
                item.textContent = m.nombres + ' — DNI: ' + m.dni + ' — ' + m.estado;
                item.onclick = () => seleccionarMiembro(m);
                div.appendChild(item);
            });
            div.style.display = 'block';
        });
}

function seleccionarMiembro(m) {
    document.getElementById('buscarMiembro').value = m.nombres;
    document.getElementById('miembroIdInput').value = m.id;
    document.getElementById('miembroNombreInput').value = m.nombres;
    document.getElementById('resultadosBusqueda').style.display = 'none';
    const info = document.getElementById('miembroSeleccionado');
    info.textContent = '✓ Seleccionado: ' + m.nombres + ' — Estado actual: ' + m.estado
        + ' — Días restantes: ' + m.diasRestantes;
}

document.addEventListener('click', e => {
    if (!e.target.closest('#buscarMiembro') && !e.target.closest('#resultadosBusqueda')) {
        document.getElementById('resultadosBusqueda').style.display = 'none';
    }
});

// Monto inicial
actualizarMonto();
</script>
</body>
</html>
